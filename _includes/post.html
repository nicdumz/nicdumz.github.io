<div class="columns is-centered">
  <div class="column is-10-tablet is-8-desktop is-7-widescreen">
    <article>
      <div class="blog_post content box">
        <header>
          <div id="{{ include.post.id | replace: "/" "-" }}"></div>
          <h2 class="blog_post_title">
            <a href="{{ include.post.url }}" rel="bookmark" title="Permanent Link to {{ include.post.title }}">
              {{ include.post.title }}
            </a>
          </h2>
          <p class="mb-5">
            <small>
              <span class="blog_post_date is-italic">{{ include.post.date }}</span> 
              <!--
              {% unless include.post.tags == empty %} | tagged:
              <span class="blog_post_tags">
              {% for tag in include.post.tags %}
                 <a href="/blog/tag/{{ tag }}">{{ tag }} </a>
              {% endfor %}
              </span>
              {% endunless %}
              -->
            </small>
          </p>
        </header>
        <div class="post_prose">
          {{ include.post.content }}
        </div>
      </div>
    </article>
  </div>
</div>
